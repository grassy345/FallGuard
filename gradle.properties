# gradle.properties — Gradle Settings
# These are configuration flags that control how the build system works.

# Use AndroidX libraries (the modern Android support libraries)
android.useAndroidX=true

# Each module only sees its own resources (keeps things clean)
android.nonTransitiveRClass=true

# Give Gradle enough memory to build the app
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Use the new Kotlin code style
kotlin.code.style=official
